<form #registerForm="ngForm" (ngSubmit)="register()">
  <h2 class="text-center text-primary">Sign Up</h2>
  <hr>

  <div class="form-group">
    <input name="username" [(ngModel)]="model.username" type="text" class="form-control" required
      placeholder="Username">
  </div>

  <div class="form-group">
    <label for="favoriteValue">Choose favoriteValue:</label>
    <select name="favoriteValue" id="favoriteValue" class="form-control">
      <option *ngFor="let value of valuesFromHome" [value]="value.id">{{value.name}}</option>
    </select>
  </div>

  <div class="form-group">
    <input name="password" [(ngModel)]="model.password" type="password" class="form-control" required
      placeholder="Password">
  </div>

  <div class="form-group text-center">
    <button class="btn btn-success" type="submit">Register</button>
    <button class="btn btn-default" type="button" (click)="cancel()">Cancel</button>
  </div>

</form>
